<!DOCTYPE html>
<html>
<head>
  <title>CatchupX Animation</title>
</head>
<body>

<h2>Enter Topic</h2>
<input type="text" id="topic" value="Newton's Law of Motion">
<button onclick="generate()">Generate</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, sphere, arrow;

let animationData = [];

// ✅ INIT 3D
function init() {
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry();
    const material = new THREE.MeshBasicMaterial();
    sphere = new THREE.Mesh(geometry, material);

    scene.add(sphere);

    // arrow (force)

const dir = new THREE.Vector3(1, 0, 0); // right direction
const origin = new THREE.Vector3(0, 0, 0);
const length = 2;

arrow = new THREE.ArrowHelper(dir, origin, length);

scene.add(arrow);

// initially invisible
arrow.visible = false;
}

// ✅ RENDER LOOP
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

// ✅ BACKEND CALL
async function generate() {
  const text = document.getElementById("topic").value;

  const response = await fetch("http://127.0.0.1:8000/generate-animation", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text })
  });

  const data = await response.json();

  console.log(data);

  animationData = data.animation;

  runAnimation();
}

// ✅ PLAY ANIMATION
function runAnimation() {
    let step = 0;

    function play() {
        if (step >= animationData.length) return;

        const action = animationData[step];

        // 👉 FORCE SHOW
        if (action.action === "show_force") {
            arrow.visible = true;

            step++;
            setTimeout(play, 1000);
            return;
        }

        // 👉 MOVE WITH PHYSICS
        if (action.action === "move") {
            let targetX = action.to[0];

            let velocity = 0;
            let acceleration = 0.02;

            function smoothMove() {
                if (sphere.position.x >= targetX) {
                    step++;
                    setTimeout(play, 500);
                    return;
                }

                velocity += acceleration;
                sphere.position.x += velocity;

                requestAnimationFrame(smoothMove);
            }

            smoothMove();
            return;
        }

        step++;
        play();
    }

    play();
}

// START
init();
animate();
</script>

</body>
</html>
